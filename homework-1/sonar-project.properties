# SonarQube / SonarCloud configuration (the direct equivalent of Sonar for Java).
# Run locally against a Sonar server with:  sonar-scanner
# Coverage is consumed from coverage.xml (generate via: pytest --cov=src --cov-report=xml).
sonar.projectKey=banking-transactions-api
sonar.projectName=Homework 1 - Banking Transactions API
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.10,3.11,3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.sourceEncoding=UTF-8
